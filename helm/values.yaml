# Default values for keycloak-comu.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

revisionHistoryLimit: 5

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/ia-generative/keycloak-comu
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: keycloak-comu.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /readyz
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Application specific settings
environment: production

instanceId: UNKNOWN

app:
  env: production
  port: "8080"
  publicUrl: ""
  appTitle: "Keycloak Community"

  oidc:
    issuerUrl: "http://localhost:8081/realms/mirai"
    # issuerUrl:
    #   valueFrom:
    #     secretKeyRef:
    #       name: oidc-config
    #       key: issuer-url
    jwksUrl: "http://localhost:8081/realms/mirai/protocol/openid-connect/certs"
    clientId: "keycloak-comu"
    swaggerClientId: "keycloak-comu-swagger"

  cors:
    allowedOrigins: "*"
    allowedMethods: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
    allowedHeaders: "Accept,Authorization,Content-Type,Origin"
    allowCredentials: false
    maxAgeSeconds: 300

  smtp:
    enabled: false
    host: ""
    port: 25
    from: no-reply@keycloak.comu
    username:
      valueFrom:
        secretKeyRef:
          name: ""
          key: username
    password:
      valueFrom:
        secretKeyRef:
          name: ""
          key: password
    existingSecret: {}

  keycloak:
    adminUsername:
      valueFrom:
        secretKeyRef:
          name: ""
          key: admin-user
    adminPassword:
      valueFrom:
        secretKeyRef:
          name: ""
          key: admin-password
    adminRealm: ""
    url: ""
    internalUrl: ""
    realm: ""
    rootGroupPath: ""

frontend:
  disabled: false

postgres:
  host:
    valueFrom:
      secretKeyRef:
        name: ""
        key: host
  port:
    valueFrom:
      secretKeyRef:
        name: ""
        key: port
  database:
    valueFrom:
      secretKeyRef:
        name: ""
        key: dbname
  user:
    valueFrom:
      secretKeyRef:
        name: ""
        key: user
  password:
    valueFrom:
      secretKeyRef:
        name: ""
        key: password

# -- Extra Kubernetes resources to be deployed along with the release.
# expressed as a map of YAML documents to be merged
extraResources: {}
# resourceA:
#   apiVersion: v1
#   kind: ConfigMap
#   metadata: ...
# resourceB:
#   apiVersion: v1
#   kind: ConfigMap
#   metadata: ...

serviceMonitor:
  # -- Enable a prometheus ServiceMonitor.
  # @section -- Servicename
  enabled: true
  # -- Prometheus ServiceMonitor labels.
  # @section -- Servicename
  labels: {}
  # -- Prometheus ServiceMonitor annotations.
  # @section -- Servicename
  annotations: {}
  endpoints:
  # -- Prometheus ServiceMonitor interval.
  # @section -- Servicename
  - interval: 30s
    # -- Prometheus ServiceMonitor scrapeTimeout. If empty, Prometheus uses the global scrape timeout unless it is less than the target's scrape interval value in which the latter is used.
    # @section -- Servicename
    scrapeTimeout: 10s
    # -- Path used by the Prometheus ServiceMonitor to scrape metrics.
    # @section -- Servicename
    path: /metrics
    # -- When true, honorLabels preserves the metric’s labels when they collide with the target’s labels.
    # @section -- Servicename
    honorLabels: false
    # -- Prometheus RelabelConfigs to apply to samples before scraping.
    # @section -- Servicename
    relabelings: []
    # -- Prometheus MetricRelabelConfigs to apply to samples before ingestion.
    # @section -- Servicename
    metricRelabelings: []
    # -- Prometheus ServiceMonitor selector.
    # @section -- Servicename
    selector: {}
    # prometheus: kube-prometheus
    # -- Prometheus ServiceMonitor scheme.
    # @section -- Servicename
    scheme: ""
    # -- Prometheus ServiceMonitor tlsConfig.
    # @section -- Servicename
    tlsConfig: {}
