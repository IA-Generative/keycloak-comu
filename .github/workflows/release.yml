name: Release

on:
  push:
    branches:
    - main

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write

    name: Create new release
    runs-on: ubuntu-latest
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      major-tag: ${{ steps.release.outputs.major }}
      minor-tag: ${{ steps.release.outputs.minor }}
      patch-tag: ${{ steps.release.outputs.patch }}
      pr_branch_name: ${{ steps.export-pr.outputs.pr_branch_name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Pre release new version
      id: release
      uses: googleapis/release-please-action@v4
      with:
        target-branch: main
        token: ${{ secrets.SECRET_GITHUB_TOKEN }}
    - name: Export PR branch name
      id: export-pr
      run: |
        echo '${{ steps.release.outputs.pr }}' > pr.json
        cat pr.json
        export PR=$(jq -r .headBranchName < pr.json)
        echo "$PR"
        echo "pr_branch_name=$PR" >> $GITHUB_OUTPUT

    - name: Checkout to PR branch
      if: ${{ steps.export-pr.outputs.pr_branch_name }}
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.export-pr.outputs.pr_branch_name }}
        fetch-depth: 0

    - name: Update Chart.yaml with new version and document it
      if: ${{ steps.export-pr.outputs.pr_branch_name }}
      run: |
        export VERSION=$(echo "${{ steps.release.outputs.tag_name }}" | sed 's/^v//')
        yq e -i '.appVersion = env(VERSION)' helm/Chart.yaml

        CHART_VERSION=$(yq .version helm/Chart.yaml)
        IFS='.' read -r major minor patch <<< "$CHART_VERSION"
        export NEW_CHART_VERSION="$major.$minor.$((patch + 1))"
        echo "$NEW_CHART_VERSION"
        yq e -i '.version = env(NEW_CHART_VERSION)' helm/Chart.yaml

        docker run --rm --volume "$(pwd)/helm:/helm-docs" -u $(id -u) docker.io/jnorwood/helm-docs:latest
        git config --global user.name "Arnaud Tardif"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit --amend --no-edit
        git push origin -f
