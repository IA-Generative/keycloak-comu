services:
  keycloak:
    image: docker.io/bitnamilegacy/keycloak:26.3.0
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8081:8080"
    restart: unless-stopped
    container_name: keycloak-comu_keycloak
    entrypoint: /opt/bitnami/keycloak/bin/kc.sh
    volumes:
    - ../keycloak/realms:/opt/keycloak/data/import
    - ../keycloak/realms:/opt/bitnami/keycloak/data/import
    user: root
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://database:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      KC_HOSTNAME: localhost
    command: start-dev --import-realm
    healthcheck:
      test: [CMD, curl, --head, fsS, "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    attach: false

  database:
    image: postgres:15
    container_name: keycloak-comu_database
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    volumes:
    - db-data:/var/lib/postgresql/data
    ports:
    - 5432:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U keycloak -d keycloak
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    depends_on:
      database:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      CONFIG_FILE: /app/config/config.yaml
      WRITE_SPEC_ONLY: "false"
      ENV: development
      PORT: "8080"
      PUBLIC_URL: http://localhost:8080
      DATABASE_URL: postgres://keycloak:password@database:5432/keycloak?sslmode=disable
      OIDC_ISSUER_URL: http://localhost:8081/realms/mirai
      OIDC_INTERNAL_ISSUER_URL: http://keycloak:8080/realms/mirai
      OIDC_JWKS_URL: http://keycloak:8080/realms/mirai/protocol/openid-connect/certs
      OIDC_CLIENT_ID: keycloak-comu
      OIDC_SWAGGER_CLIENT_ID: keycloak-comu-swagger
      KEYCLOAK_URL: http://keycloak:8080/
      KEYCLOAK_REALM: mirai
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@keycloak-comu.local
      SMTP_ENCRYPTION: none
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
      FRONTEND_ENABLED: "false"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      VITE_PROXY_TARGET: http://backend:8080
      HEY_API_INPUT: http://backend:8080/api/openapi.json
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  db-data:
  go-mod-cache:
  frontend-node-modules:
